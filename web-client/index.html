<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:xlink="http://www.w3.org/1999/xlink">
<meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="cache-control" content="no-cache">
<meta http-equiv="Content-Security-Policy"
    content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *;">
<meta charset="utf-8">

<head>
    <title>ScratchJr Web Viewer</title>
    <link rel="stylesheet" href="css/base.css" type="text/css">
    <link rel="stylesheet" href="css/editor.css" type="text/css">
    <link rel="stylesheet" href="css/editorleftpanel.css" type="text/css">
    <link rel="stylesheet" href="css/editorstage.css" type="text/css">
    <link rel="stylesheet" href="css/editormodal.css" type="text/css">
    <link rel="stylesheet" href="css/librarymodal.css" type="text/css">
    <link rel="stylesheet" href="css/paintlook.css" type="text/css">

</head>

<body>
    <div class="frame" id="frame">
        <div class="topbar" id="topbar">
            <ul class="topbar-nav" id="nav">
                <li class="logo" id="logotab">
                    <span class="logo-icon"></span>
                </li>
                <div></div>
                <li class="home" id="hometab">
                    <span class="home-icon"></span>
                </li>
                <div></div>
                <li class="upload" id="uploadtab" onclick="openUploadModal()">
                    <span class="upload-icon"></span>
                    <span class="upload-text">Upload SJR</span>
                </li>
                <div></div>
                <li class="help" id="helptab">
                    <span class="help-icon"></span>
                </li>
                <div></div>
            </ul>
            <ul class="reference" id="settings">
                <div></div>
                <li class="gear" id="geartab">
                    <span class="gear-icon"></span>
                </li>
            </ul>
            <ul class="reference" id="reference">
                <div></div>
                <li class="book" id="booktab">
                    <span class="book-icon"></span>
                </li>
            </ul>
        </div>
        <div class="topsection" id="topsection">
            <div class="tabtitle" id="tabtitle">
                <span id="tabheader"></span>
            </div>
            <div class="tabicon" id="tabicon"></div>
            <div class="blueband" id="blueband">
                <span id="subtitle"></span>
            </div>
        </div>
        <div class="contentwrap" id="wrapc"></div>
        <div class="libframe" id="libframe"></div>
        <div class="paintframe" id="paintframe"></div>

        <!-- CodeJr Style Upload Modal -->
        <div id="uploadModal" class="modal-overlay" style="display:none;">
            <div class="modal-content">
                <h3>Load Remote Project</h3>
                <p>Enter the URL of a .sjr file to automate the import:</p>
                <input type="text" id="sjrUrlInput" placeholder="https://example.com/project.sjr" />
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closeUploadModal()">Cancel</button>
                    <button class="btn-load" id="loadBtn" onclick="triggerManualLoad()">Load Project</button>
                </div>
                <!-- Loading Spinner -->
                <div id="loaderContainer" style="display:none; margin-top: 20px; flex-direction: column; align-items: center;">
                    <div class="spinner"></div>
                    <p style="margin-top:10px; font-size: 12px; color: #666;">Fetching project data...</p>
                </div>
            </div>
        </div>
        <div class="footer off" id="footer">
            <ul class="footer-nav" id="footernav">
                <li class="tab" id="abouttab">
                    <div class="about-icon"></div>
                    <span id="abouttab-text"></span>
                </li>
                <li class="tab" id="interfacetab">
                    <div class="interface-icon"></div>
                    <span id="interfacetab-text"></span>
                </li>
                <li class="tab" id="painttab">
                    <div class="paint-icon"></div>
                    <span id="painttab-text"></span>
                </li>
                <li class="tab" id="blockstab">
                    <div class="blocks-icon"></div>
                    <span id="blockstab-text"></span>
                </li>
                <li class="tab2" id="privacytab">
                    <div class="privacy-icon"></div>
                    <span id="privacytab-text"></span>
                </li>
                <div></div>
            </ul>
        </div>

    </div>

    <!-- This tells the ScratchJr bundle which page to render -->
    <script>
        window.scratchJrPage = 'editor';
    </script>

    <script>
        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }

        function triggerManualLoad() {
            const url = document.getElementById('sjrUrlInput').value;
            if (url) {
                // Show loader and hide buttons
                document.getElementById('loaderContainer').style.display = 'flex';
                document.querySelector('.modal-buttons').style.display = 'none';
                
                // Small delay to show the spinner before redirect
                setTimeout(() => {
                    window.location.href = `index.html?sjr=${encodeURIComponent(url)}`;
                }, 800);
            }
        }
    </script>

    <script>
        // Manually push the settings into the global scope in case XHR fails
        window.ScratchJr = window.ScratchJr || {};
        window.ScratchJr.settings = {
            "edition": "free",
            "scratchJrVersion": "iOSv01",
            "defaultLocale": "en",
            "is_web": true
        };
    </script>

    <!-- 2. The Database Engine (sql.js / Wasm) -->
    <script type="text/javascript" src="js/sql-wasm.js"></script>

    <!-- 3. The Fake Tablet Bridge (mocks window.tablet) -->
    <script type="text/javascript" src="js/web-bridge.js"></script>

    <!-- 4. The ScratchJr Brain (Engine) -->
    <script type="text/javascript" src="js/app.bundle.js"></script>

    <!-- 4.5. Instantiate ScratchJr if not already done -->
    <script>
        (function ensureScratchJrInstance() { 
            console.log("[Init] Starting ScratchJr initialization..."); 
            
            // Function to check if ScratchJr is ready 
            function tryInit() { 
                // Check if the main class exists and has appinit 
                if (window.ScratchJr && typeof window.ScratchJr.appinit === 'function') { 
                    console.log("[Init] Found ScratchJr.appinit, initializing..."); 
                    
                    // Create settings if not exists 
                    if (!window.Settings) { 
                        window.Settings = { 
                            edition: "free", 
                            scratchJrVersion: "web", 
                            defaultLocale: "en", 
                            stageColor: "#FFFFFF", 
                            defaultSprite: "Cat", 
                            autoSaveInterval: 30000, 
                            shareEnabled: true, 
                            supportedLocales: { English: "en" } 
                        }; 
                    } 
                    
                    // Call appinit to initialize the engine 
                    window.ScratchJr.appinit(window.ScratchJr.version || "1.2.0"); 
                    
                    // Force the editor to load if it's the target page
                    if (window.scratchJrPage === 'editor') {
                        console.log("[Init] Forcing editor mode initialization...");
                    }                            console.log("[Init] Loading pending project..."); 
                            // Try the candidates via the bridge's method
                            if (window.iOS && typeof window.iOS.loadProjectFromSjr === 'function') {
                                window.iOS.loadProjectFromSjr(window.pendingSjrData);
                            }
                        } 
                    }, 500); 
                    return true; 
                } 
                return false; 
            } 
            
            // Try immediately, then retry 
            if (!tryInit()) { 
                console.log("[Init] Waiting for ScratchJr.appinit..."); 
                var initInterval = setInterval(function() { 
                    if (tryInit()) { 
                        clearInterval(initInterval); 
                    } 
                }, 200); 
                // Timeout after 10 seconds 
                setTimeout(function() { 
                    clearInterval(initInterval); 
                    console.error("[Init] Failed to initialize ScratchJr after timeout"); 
                }, 10000); 
            } 
        })(); 
    </script>

    <!-- 5. URL-based project auto-loader -->
    <script type="text/javascript" src="js/auto-loader.js"></script>

</body>

</html>
