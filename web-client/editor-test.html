<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ScratchJr Editor - Alternative</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/editorleftpanel.css">
    <link rel="stylesheet" href="css/editorstage.css">
    <link rel="stylesheet" href="css/editormodal.css">
    <link rel="stylesheet" href="css/librarymodal.css">
    <link rel="stylesheet" href="css/paintlook.css">
</head>
<body style="background: white; margin: 0; overflow: hidden;">
    <div class="frame" id="frame"></div>
    <div class="libframe" id="libframe"></div>
    <div class="paintframe" id="paintframe"></div>

    <script src="js/sql-wasm.js"></script>
    <script src="js/web-bridge.js"></script>
    
    <script>
        // Setup BEFORE bundle
        window.scratchJrPage = 'editor';
        window.Settings = {
            edition: "free",
            scratchJrVersion: "Webv01",
            defaultLocale: "en",
            stageColor: "#F5F2F7",
            defaultSprite: "Star.svg",
            autoSaveInterval: 30000,
            shareEnabled: true,
            supportedLocales: { English: "en" }
        };
        
        // Hook into the bundle's expected initialization
        window.onload = function() {
            console.log('[Window] onload fired');
            if (window.ScratchJr && typeof window.ScratchJr === 'function') {
                console.log('[Window] Creating ScratchJr instance');
                try {
                    const app = new window.ScratchJr();
                    window.ScratchJrApp = app;
                    window.OS = app;
                    
                    // Try to call any initialization methods
                    if (app.init) app.init();
                    if (app.start) app.start();
                    if (app.run) app.run();
                    
                    console.log('[Window] Instance created:', Object.keys(app));
                } catch(e) {
                    console.error('[Window] Error:', e);
                }
            }
        };
    </script>
    
    <script src="js/app.bundle.js"></script>
    
    <script>
        // Fallback: try again after bundle loads
        setTimeout(() => {
            if (!window.ScratchJrApp) {
                console.log('[Fallback] Trying to initialize...');
                if (window.ScratchJr && typeof window.ScratchJr === 'function') {
                    window.ScratchJrApp = new window.ScratchJr();
                    window.OS = window.ScratchJrApp;
                    console.log('[Fallback] Created instance');
                }
            }
        }, 500);
    </script>
</body>
</html>
